<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comments</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    margin:0;
    color:white;
    font-family:system-ui;
    background:linear-gradient(135deg,#06b6d4,#2563eb,#7c3aed,#facc15);
    background-size:300% 300%;
    animation:bgMove 10s ease infinite;
    padding-bottom:90px;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* HEADER */
.header{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(255,255,255,.12);
}

/* COMMENT */
.comment{
    display:flex;
    gap:12px;
    margin:12px;
    padding:14px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.08);
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid white;
    box-shadow:0 0 12px rgba(255,255,255,.25);
}

.content{
    flex:1;
}

.username{
    font-weight:700;
    font-size:14px;
    cursor:pointer;
}

.text{
    font-size:14px;
    margin-top:2px;
    line-height:1.4;
}

.meta{
    font-size:12px;
    color:#ddd;
    margin-top:6px;
}

.reply,
.like{
    cursor:pointer;
    margin-right:12px;
}

.followBtn{
    border:none;
    color:white;
    font-size:12px;
    font-weight:700;
    padding:6px 14px;
    border-radius:999px;
    background:linear-gradient(135deg,#06b6d4,#2563eb,#7c3aed,#facc15);
    background-size:250% 250%;
    animation:bgMove 4s linear infinite;
}

/* INPUT */
.inputBox{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    display:flex;
    gap:10px;
    padding:12px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(18px);
    border-top:1px solid rgba(255,255,255,.12);
    z-index:999;
}

.inputBox input{
    flex:1;
    border:none;
    outline:none;
    padding:12px 16px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    color:white;
    font-size:14px;
}

.inputBox input::placeholder{
    color:#ddd;
}

.inputBox button{
    border:none;
    color:white;
    font-weight:700;
    padding:12px 18px;
    border-radius:999px;
    background:linear-gradient(135deg,#06b6d4,#2563eb,#7c3aed,#facc15);
    background-size:250% 250%;
    animation:bgMove 4s linear infinite;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="history.back()">⬅</button>
  <b>Comments</b>
  <div></div>
</div>

<div id="commentList"></div>

<div class="inputBox">
  <input id="commentInput" placeholder="Add a comment...">
  <button onclick="sendComment()">Post</button>
</div>

<script>

let reelId = "{{ reel_id }}";
let currentUser = "{{ current_user or '' }}";
let replyTo = null;

/* LOAD */
async function loadComments(){
  try{
    const res = await fetch(`/reels/comments/${reelId}`);
    const d = await res.json();

    let html="";

    d.comments.forEach(c=>{
      html += renderComment(c);
    });

    document.getElementById("commentList").innerHTML = html;

  }catch(e){
    console.error(e);
  }
}

/* RENDER COMMENT */
function renderComment(c){

  let isMe = String(c.user_id) === String(currentUser);

  return `
  <div class="comment" onclick="event.stopPropagation()">

    <img src="${c.profile || '/static/default_dp.png'}"
         class="avatar"
         onerror="this.src='/static/default_dp.png'"
         onclick="openProfile(${c.user_id})">

    <div class="content">

      <div class="username" onclick="openProfile(${c.user_id})">
        @${c.username}
      </div>

      <div class="text">${c.text}</div>

      <div class="meta">
        <span class="like" onclick="likeComment(${c.id}, this)">
          ❤️ ${c.likes || 0}
        </span>

        <span class="reply" onclick="setReply('${c.id}','${c.username}')">
          Reply
        </span>
      </div>

      ${c.replies ? c.replies.map(r=>`
        <div style="margin-left:20px;margin-top:8px">
          <div class="username" onclick="openProfile(${r.user_id})">@${r.username}</div>
          <div class="text">${r.text}</div>
        </div>
      `).join("") : ""}

    </div>

    ${!isMe ? `
      <button class="followBtn" onclick="followUser(${c.user_id}, this)">
        Follow
      </button>
    ` : ``}

  </div>`;
}

/* PROFILE */
function openProfile(id){
  window.location.href = "/profile/" + id;
}

/* FOLLOW */
async function followUser(id,btn){
  btn.innerText="...";
  const res = await fetch(`/social/follow/${id}`,{method:"POST"});
  const d = await res.json();

  btn.innerText = d.action === "followed" ? "Following" : "Follow";
}

/* LIKE COMMENT */
async function likeComment(id, el){
  const res = await fetch(`/reels/comment_like/${id}`,{method:"POST"});
  const d = await res.json();

  if(d.ok){
    el.innerText = "❤️ " + d.likes;
  }
}

/* REPLY */
function setReply(id,user){
  replyTo = id;
  document.getElementById("commentInput").placeholder = "Reply to @" + user;
}

/* SEND */
async function sendComment(){
  let text = document.getElementById("commentInput").value;
  if(!text) return;

  let fd = new FormData();
  fd.append("comment", text);

  if(replyTo){
    fd.append("reply_to", replyTo);
  }

  await fetch(`/reels/comment/${reelId}`,{
    method:"POST",
    body:fd
  });

  document.getElementById("commentInput").value="";
  replyTo=null;

  loadComments();
}

/* AUTO REFRESH */
setInterval(loadComments,5000);

loadComments();

</script>

</body>
</html>
