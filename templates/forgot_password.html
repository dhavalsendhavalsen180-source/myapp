<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password • InsChat</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center px-5 bg-gradient-to-br from-cyan-500 via-blue-600 via-purple-600 to-yellow-400">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img
src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-14 w-14 object-contain mb-4">

<h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 bg-clip-text text-transparent">
InsChat
</h1>

<p class="text-gray-500 text-sm mt-3">
Forgot your password? Enter your username, email or phone number to continue.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="mb-4 text-center text-sm rounded-xl p-3
{% if category=='error' %}
bg-red-100 text-red-600
{% else %}
bg-green-100 text-green-600
{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" class="space-y-4">

<input
type="text"
name="login"
placeholder="Username, Email or Phone"
required
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500">

<button
type="submit"
class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">

Continue

</button>

</form>

<div class="text-center mt-6">

<a
href="{{ url_for('auth.login') }}"
class="font-semibold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 bg-clip-text text-transparent hover:underline">

← Back to Login

</a>

</div>

</div>

</div>

</body>
</html>
