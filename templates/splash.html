<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InsChat</title>
<style>
    body{
        margin:0;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        height:100vh;
        overflow:hidden;
        font-family:Arial,sans-serif;

        background:linear-gradient(
            90deg,
            #06b6d4 0%,
            #2563eb 35%,
            #7c3aed 70%,
            #facc15 100%
        );
        background-size:300% 300%;
        animation:bgMove 8s ease infinite;
    }

    /* Logo */
    img{
        max-width:180px;
        height:auto;
        opacity:0;
        transform:scale(.8);
        filter:drop-shadow(0 0 20px rgba(255,255,255,.35));
        animation:fadeInZoom 1.6s ease forwards,
                  logoGlow 3s ease-in-out infinite;
    }

    /* App Name */
    h1{
        margin-top:22px;
        font-size:3rem;
        font-weight:800;
        letter-spacing:3px;
        color:#fff;
        text-shadow:
            0 0 10px rgba(255,255,255,.6),
            0 0 25px rgba(255,255,255,.3);

        opacity:0;
        transform:translateY(40px);
        animation:slideUp 1.6s ease forwards .8s;
    }

    /* Loader */
    .loader{
        display:flex;
        gap:12px;
        margin-top:30px;
    }

    .dot{
        width:14px;
        height:14px;
        border-radius:50%;
        background:#fff;
        animation:bounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2){
        animation-delay:.2s;
    }

    .dot:nth-child(3){
        animation-delay:.4s;
    }

    /* Background Animation */
    @keyframes bgMove{
        0%{
            background-position:0% 50%;
        }
        50%{
            background-position:100% 50%;
        }
        100%{
            background-position:0% 50%;
        }
    }

    /* Logo */
    @keyframes fadeInZoom{
        from{
            opacity:0;
            transform:scale(.8);
        }
        to{
            opacity:1;
            transform:scale(1);
        }
    }

    @keyframes logoGlow{
        0%,100%{
            filter:drop-shadow(0 0 15px rgba(255,255,255,.35));
        }
        50%{
            filter:drop-shadow(0 0 35px rgba(255,255,255,.8));
        }
    }

    /* Text */
    @keyframes slideUp{
        from{
            opacity:0;
            transform:translateY(40px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    /* Loader */
    @keyframes bounce{
        0%,80%,100%{
            transform:scale(.6);
            opacity:.5;
        }
        40%{
            transform:scale(1.2);
            opacity:1;
        }
    }
</style>
  <script>
    // 3 second ke baad home page par redirect
    setTimeout(function(){
      window.location.href = "/home";
    }, 3000);
  </script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff0066">
<link rel="apple-touch-icon" href="/static/icons/inschat_icon_180x180.png">

</head>
<body>
  <!-- Logo -->
  <img src="{{ url_for('static', filename='inschat_logo.png') }}" alt="InsChat Logo">

  <!-- Gradient text -->
  <h1>InsChat</h1>

  <!-- Loader dots -->
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js');
  });
}
</script>

</body>
</html>
