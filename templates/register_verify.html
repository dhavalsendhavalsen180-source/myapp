<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Information • InsChat</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center px-5 bg-gradient-to-br from-cyan-500 via-blue-600 via-purple-600 to-yellow-400">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img
src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-14 w-14 object-contain mb-4">

<h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 bg-clip-text text-transparent">
InsChat
</h1>

<p class="text-gray-500 text-sm mt-3">
Secure your account with your phone number or continue instantly using Google.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="mb-4 text-center text-sm
{% if category=='error' %}
text-red-600
{% else %}
text-green-600
{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<a
href="{{ url_for('auth.google_login') }}"
class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-xl py-3 font-semibold hover:bg-gray-100 transition">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
class="w-5 h-5">

Continue with Google

</a>

<div class="flex items-center my-6">

<hr class="flex-1 border-gray-300">

<span class="mx-3 text-xs text-gray-400 font-semibold">
OR
</span>

<hr class="flex-1 border-gray-300">

</div>

<form method="POST" class="space-y-4">

<input
type="tel"
name="phone"
placeholder="Mobile number"
required
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500">

<input
type="email"
name="email"
placeholder="Email (optional)"
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">

<button
type="submit"
class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">

Continue

</button>

</form>

</div>

</div>

</body>
</html>
