<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-pink-500 via-red-500 to-yellow-400 min-h-screen flex items-center justify-center px-5">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-16 mb-4">

<h1 class="text-2xl font-bold">
Verify OTP
</h1>

<p class="text-gray-500 text-sm mt-2">
Enter the 6 digit OTP.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="text-center mb-4
{% if category=='error' %}
text-red-600
{% else %}
text-green-600
{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<input
type="text"
name="code"
maxlength="6"
placeholder="Enter OTP"
required
class="w-full border rounded-xl px-4 py-3 mb-4 focus:ring-2 focus:ring-pink-500 outline-none">

<button
class="w-full bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 text-white rounded-xl py-3 font-semibold">

Verify OTP

</button>

</form>

</div>

</div>

</body>
</html>
