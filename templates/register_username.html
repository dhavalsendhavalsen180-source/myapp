<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Username • InsChat</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center px-5 bg-gradient-to-br from-cyan-500 via-blue-600 via-purple-600 to-yellow-400">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img
src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-14 w-14 object-contain mb-4">

<h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 bg-clip-text text-transparent">
InsChat
</h1>

<p class="text-gray-500 text-sm mt-2">
Choose a unique username for your account.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="mb-4 text-center text-sm
{% if category=='error' %}
text-red-600
{% else %}
text-green-600
{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" class="space-y-5">

<input
id="username"
name="username"
type="text"
required
autocomplete="off"
placeholder="Username"
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500">

<div
id="usernameStatus"
class="text-sm text-center mt-2"></div>

<button
type="submit"
class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">

Continue

</button>

</form>

<div class="mt-6">

<a
href="{{ url_for('auth.login') }}"
class="block w-full text-center border border-gray-300 rounded-xl py-3 font-semibold hover:bg-gray-100 transition">

Already have an account? Log in

</a>

</div>

</div>

</div>

<script>

const usernameInput = document.getElementById("username");
const usernameStatus = document.getElementById("usernameStatus");

let timer;

usernameInput.addEventListener("input", () => {

clearTimeout(timer);

const username = usernameInput.value.trim();

if (username.length < 3) {
usernameStatus.innerHTML = "";
return;
}

timer = setTimeout(() => {

fetch(`/auth/check_username?username=${encodeURIComponent(username)}`)

.then(r => r.json())

.then(data => {

if (data.available){

usernameStatus.innerHTML="✅ Username available";
usernameStatus.className="text-green-600 text-sm text-center mt-2";

}else{

usernameStatus.innerHTML="❌ Username already taken";
usernameStatus.className="text-red-600 text-sm text-center mt-2";

}

});

},400);

});

</script>

</body>
</html>
