<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password - InsChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-pink-500 via-red-500 to-yellow-400 min-h-screen flex items-center justify-center">

<div class="bg-white w-80 rounded-2xl shadow-xl p-8">

    <div class="text-center">

        <img src="{{ url_for('static', filename='inschat_logo.png') }}"
             class="w-16 h-16 mx-auto mb-4">

        <h1 class="text-2xl font-bold text-gray-800">
            Create New Password
        </h1>

        <p class="text-gray-500 text-sm mt-2">
            Your new password must be at least 8 characters.
        </p>

    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mt-4 p-3 rounded-lg
            {% if category == 'error' %}
              bg-red-100 text-red-700
            {% else %}
              bg-green-100 text-green-700
            {% endif %}">
              {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="mt-6">

        <input
            type="password"
            name="password"
            placeholder="New Password"
            minlength="8"
            required
            class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500">

        <input
            type="password"
            id="confirm_password"
            placeholder="Confirm Password"
            minlength="8"
            required
            class="w-full border rounded-lg px-4 py-3 mt-4 focus:outline-none focus:ring-2 focus:ring-pink-500">

        <p id="error" class="text-red-600 text-sm mt-2 hidden">
            Passwords do not match.
        </p>

        <button
            id="submitBtn"
            type="submit"
            class="w-full mt-5 bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-lg font-semibold">

            Update Password

        </button>

    </form>

    <div class="text-center mt-6">

        <a href="{{ url_for('auth.login') }}"
           class="text-pink-600 font-semibold">

            Back to Login

        </a>

    </div>

</div>

<script>
const password = document.querySelector('input[name="password"]');
const confirmPassword = document.getElementById("confirm_password");
const error = document.getElementById("error");
const submitBtn = document.getElementById("submitBtn");

function checkPasswords() {
    if (confirmPassword.value === "") {
        error.classList.add("hidden");
        submitBtn.disabled = false;
        return;
    }

    if (password.value !== confirmPassword.value) {
        error.classList.remove("hidden");
        submitBtn.disabled = true;
    } else {
        error.classList.add("hidden");
        submitBtn.disabled = false;
    }
}

password.addEventListener("input", checkPasswords);
confirmPassword.addEventListener("input", checkPasswords);
</script>

</body>
</html>
