<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify OTP • InsChat</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center px-5 bg-gradient-to-br from-cyan-400 via-blue-500 via-purple-600 to-yellow-400">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img
src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-14 w-14 object-contain mb-4">

<h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 bg-clip-text text-transparent">
InsChat
</h1>

<p class="text-gray-500 text-sm mt-3">
Enter the 6-digit verification code sent to your email.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="mb-4 text-center text-sm {% if category=='error' %}text-red-600{% else %}text-green-600{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form id="otpForm" method="POST" class="space-y-5">

<input
id="otpInput"
type="text"
name="code"
maxlength="6"
inputmode="numeric"
autocomplete="one-time-code"
placeholder="Enter OTP"
required
class="w-full border border-gray-300 rounded-xl px-4 py-3 text-center tracking-[8px] text-xl outline-none focus:ring-2 focus:ring-cyan-500">

<button
id="verifyBtn"
type="submit"
class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">

Verify OTP

</button>

</form>

<div class="text-center mt-6">

<p id="timer" class="text-gray-500 text-sm">
Resend code in 60s
</p>

<form action="{{ url_for('auth.resend_reset_otp') }}" method="POST">

<button
id="resendBtn"
type="submit"
disabled
class="mt-3 font-semibold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 bg-clip-text text-transparent disabled:text-gray-400 disabled:bg-none">

Resend Code

</button>

</form>

</div>

<div class="text-center mt-6">

<a
href="{{ url_for('auth.forgot_password') }}"
class="font-semibold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 bg-clip-text text-transparent hover:underline">

Back

</a>

</div>

</div>

</div>

<script>

let seconds = 60;

const timer = document.getElementById("timer");
const btn = document.getElementById("resendBtn");

const otp = document.getElementById("otpInput");
const form = document.getElementById("otpForm");

otp.focus();

otp.addEventListener("input", function(){

this.value = this.value.replace(/\D/g,"").slice(0,6);

if(this.value.length===6){
form.submit();
}

});

otp.addEventListener("paste", function(e){

e.preventDefault();

let pasted=(e.clipboardData||window.clipboardData)
.getData("text")
.replace(/\D/g,"")
.slice(0,6);

this.value=pasted;

if(this.value.length===6){
form.submit();
}

});

otp.addEventListener("keydown", function(e){

if(e.key==="Enter"){
form.submit();
}

});

const interval=setInterval(function(){

seconds--;

timer.innerText="Resend code in "+seconds+"s";

if(seconds<=0){

clearInterval(interval);

timer.innerText="";

btn.disabled=false;

}

},1000);

</script>

</body>
</html>
