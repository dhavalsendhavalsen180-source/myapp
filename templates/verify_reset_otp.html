<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - InsChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-pink-500 via-red-500 to-yellow-400 min-h-screen flex items-center justify-center">

<div class="bg-white w-80 rounded-2xl shadow-xl p-8">

    <div class="text-center">

        <img src="{{ url_for('static', filename='inschat_logo.png') }}"
             class="w-16 h-16 mx-auto mb-4">

        <h1 class="text-2xl font-bold text-gray-800">
            Verify OTP
        </h1>

        <p class="text-gray-500 text-sm mt-2">
            Enter the 6-digit OTP sent to your account.
        </p>

    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mt-4 p-3 rounded-lg
            {% if category == 'error' %}
              bg-red-100 text-red-700
            {% else %}
              bg-green-100 text-green-700
            {% endif %}">
              {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="mt-6">

        <input
            type="text"
            name="code"
            maxlength="6"
            placeholder="Enter OTP"
            required
            class="w-full border rounded-lg px-4 py-3 text-center tracking-[8px] text-xl focus:outline-none focus:ring-2 focus:ring-pink-500">

        <button
            type="submit"
            class="w-full mt-5 bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-lg font-semibold">

            Verify OTP

        </button>

    </form>

    <div class="text-center mt-6">

        <a href="{{ url_for('auth.forgot_password') }}"
           class="text-pink-600 font-semibold">

            Back

        </a>

    </div>

</div>

</body>
</html>
