<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Explore</title>
</head>

<body class="bg-gray-100">

<!-- TOP NAV -->
<div class="flex justify-between items-center px-4 py-3 bg-white shadow">
  <h1 class="text-xl font-bold">Explore</h1>
  <a href="/auth/logout" class="text-2xl">🚪</a>
</div>

<!-- STORIES (USERS DP LIST) -->
<div class="bg-white p-3 flex space-x-4 overflow-x-auto no-scrollbar">

  {% for u in users %}
  <a href="/profile/{{ u.username }}" class="text-center">

    <!-- Instagram Round Story DP -->
    <div class="w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-yellow-500 p-1">
      <div class="w-full h-full rounded-full overflow-hidden bg-gray-200">

        {% if u.photo %}
        <img src="{{ url_for('static', filename='uploads/profile/' ~ u.photo) }}"
             class="w-full h-full object-cover">
        {% else %}
        <div class="w-full h-full flex items-center justify-center text-xl font-bold">
          {{ u.username[0] | upper }}
        </div>
        {% endif %}

      </div>
    </div>

    <p class="text-xs mt-1">{{ u.username }}</p>
  </a>
  {% endfor %}

</div>

<!-- POSTS GRID -->
<div class="grid grid-cols-3 gap-1 mt-2 px-1">

  {% for p in posts %}
  <a href="/posts/view/{{ p.id }}">
    <img src="{{ url_for('static', filename='uploads/' ~ p.images[0]) }}"
         class="w-full h-32 object-cover bg-gray-300">
  </a>
  {% endfor %}

</div>

<!-- BOTTOM NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-white flex justify-around py-2 text-2xl shadow-inner">
  <a href="/posts/feed">🏠</a>
  <a href="/explore">🔍</a>
  <a href="/posts/upload">➕</a>
  <a href="/reels">🎬</a>
  <a href="/profile/{{ current_user }}">👤</a>
</div>

</body>
</html>

<!doctype html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- SEARCH BAR -->
<div class="p-3 bg-white shadow">
  <form method="GET" action="/explore/search">
    <input type="text" name="q" placeholder="Search"
           class="w-full p-2 bg-gray-200 rounded-full text-sm">
  </form>
</div>

<!-- POSTS GRID -->
<div class="p-3 grid grid-cols-3 gap-1">
  {% for img in images %}
  <a href="/posts/{{ img.post_id }}">
    <img src="{{ url_for('static', filename='uploads/' + img.image_path) }}"
         class="w-full h-32 object-cover" />
  </a>
  {% endfor %}
</div>

</body>
</html>
