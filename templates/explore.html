<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Explore</title>

  <style>
    .no-scrollbar::-webkit-scrollbar{
      display:none;
    }

    .no-scrollbar{
      scrollbar-width:none;
    }
  </style>
</head>

<body class="bg-gray-100 text-black pb-20">

<!-- TOP -->
<div class="sticky top-0 z-50 bg-white border-b p-3">

  <form method="GET" action="/explore/search">

    <input
      type="text"
      name="q"
      placeholder="Search users..."
      class="w-full bg-gray-200 rounded-full px-4 py-2 outline-none"
    >

  </form>

</div>

<!-- STORIES -->
<div class="flex gap-4 overflow-x-auto no-scrollbar p-3 border-b bg-white">

  {% for u in users %}

  <a href="/profile/{{ u.id }}" class="flex-shrink-0 text-center">

    <div class="w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-yellow-500 p-[2px]">

      <div class="w-full h-full rounded-full overflow-hidden bg-gray-700">

        {% if u.photo %}

        <img
          src="{{ u.photo }}"
          class="w-full h-full object-cover"
        >

        {% else %}

        <div class="w-full h-full flex items-center justify-center text-lg font-bold">
          {{ u.username[0].upper() }}
        </div>

        {% endif %}

      </div>

    </div>

    <p class="text-xs mt-1 w-16 truncate">
      {{ u.username }}
    </p>

  </a>

  {% endfor %}

</div>

<!-- GRID -->
<div class="grid grid-cols-3 gap-1">

  {% for item in explore_items %}

    {% if item.type == "post" %}

      <a href="/posts/{{ item.id }}">

        <img
          src="{{ item.media }}"
          class="w-full h-40 object-cover"
        >

      </a>

    {% else %}

      <a href="/reels">

        <div class="relative">

          <video
            class="w-full h-40 object-cover"
            muted
            autoplay
            loop
            playsinline
          >
            <source src="{{ item.media }}" type="video/mp4">
          </video>

          <div class="absolute top-1 right-1 text-white text-xs">
            🎬
          </div>

        </div>

      </a>

    {% endif %}

  {% endfor %}

</div>

<!-- BOTTOM NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 text-2xl">

  <a href="/posts/feed">🏠</a>

  <a href="/explore">
    🔍
  </a>

  <a href="/posts/upload">
    ➕
  </a>

  <a href="/reels">
    🎬
  </a>

  <a href="/profile/{{ current_user }}">
    👤
  </a>

</div>

</body>
</html>
