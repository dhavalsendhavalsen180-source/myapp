<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<title>Explore • InsChat</title>

<style>
body{
background:#f4f8ff;
}

.hide-scroll::-webkit-scrollbar{
display:none;
}

.hide-scroll{
scrollbar-width:none;
}

.glass{
backdrop-filter:blur(16px);
background:rgba(255,255,255,.82);
}

.story-ring{
background:linear-gradient(135deg,#2563eb,#06b6d4,#7c3aed,#facc15);
padding:2px;
border-radius:999px;
}

.story-ring img{
border:2px solid white;
}

.explore-card{
border-radius:18px;
overflow:hidden;
background:white;
box-shadow:0 8px 24px rgba(37,99,235,.08);
transition:.25s;
}

.explore-card:hover{
transform:translateY(-3px);
}
</style>

</head>

<body class="text-slate-800 pb-24">

<!-- TOP BAR -->
<div class="sticky top-0 z-50 glass border-b border-blue-100">

<div class="px-4 py-3">

<form method="GET" action="/explore/search">

<div class="relative">

<svg class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<circle cx="11" cy="11" r="7"/>
<path d="M20 20L16.6 16.6"/>

</svg>

<input
type="text"
name="q"
value="{{ query }}"
placeholder="Search creators, reels..."
class="w-full rounded-2xl bg-slate-100 border border-slate-200 pl-12 pr-4 py-3 outline-none focus:border-cyan-400 focus:bg-white transition">

</div>

</form>

</div>

</div>

<!-- USERS -->
<div class="px-3 py-4 overflow-x-auto hide-scroll">

<div class="flex gap-4 w-max">

{% for u in users %}

<a href="/profile/{{ u.id }}"
class="text-center flex-shrink-0">

<div class="story-ring">

{% if u.photo %}

<img src="{{ u.photo }}"
class="w-16 h-16 rounded-full object-cover">

{% else %}

<div class="w-16 h-16 rounded-full bg-slate-700 text-white flex items-center justify-center font-bold text-lg">

{{ u.username[0].upper() }}

</div>

{% endif %}

</div>

<div class="text-xs font-medium mt-2 w-16 truncate">

{{ u.username }}

</div>

</a>

{% endfor %}

</div>

</div>

<!-- EXPLORE GRID -->
<div class="px-2 pb-24">

<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">

{% for item in explore_items %}

<div class="explore-card">

{% if item.type == "post" %}

<a href="/posts/{{ item.id }}">

<img
src="{{ item.media }}"
class="w-full h-52 object-cover">

</a>

{% else %}

<a href="/reels?start={{ item.id }}">

<div class="relative">

<video
class="w-full h-52 object-cover bg-black"
muted
playsinline
preload="metadata">

<source src="{{ item.media }}">

</video>

<div class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 backdrop-blur flex items-center justify-center">

<svg width="15"
height="15"
viewBox="0 0 24 24"
fill="white">

<path d="M8 5v14l11-7z"/>

</svg>

</div>

</div>

</a>

{% endif %}

</div>

{% endfor %}

</div>

</div>


<!-- MODERN BOTTOM NAV -->

<div class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50">

<div class="glass border border-blue-100 rounded-3xl px-6 py-3 shadow-2xl flex items-center gap-8">

<a href="/posts/feed">

<svg class="w-6 h-6 text-slate-700 hover:text-blue-600 transition"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<path d="M3 10.5L12 3l9 7.5V21h-6v-6H9v6H3z"/>

</svg>

</a>

<a href="/explore">

<svg class="w-6 h-6 text-cyan-600"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<circle cx="11" cy="11" r="7"/>
<path d="M20 20L16.5 16.5"/>

</svg>

</a>

<a href="/create"
class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-500 via-blue-600 to-purple-600 flex items-center justify-center shadow-xl">

<svg width="24"
height="24"
viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="2.4"
stroke-linecap="round">

<path d="M12 5V19"/>
<path d="M5 12H19"/>

</svg>

</a>

<a href="/reels">

<svg class="w-6 h-6 text-slate-700 hover:text-purple-600 transition"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<rect x="3" y="3" width="18" height="18" rx="4"/>
<path d="M10 9l6 3-6 3z" fill="currentColor"/>

</svg>

</a>

<a href="/profile/{{ current_user }}">

<div class="story-ring">

<img
src="{{ current_user_photo }}"
class="w-9 h-9 rounded-full object-cover"
onerror="this.src='/static/default_dp.png'">

</div>

</a>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const videos=document.querySelectorAll("video");

const observer=new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.play().catch(()=>{});

}else{

entry.target.pause();

}

});

},{threshold:.7});

videos.forEach(v=>observer.observe(v));

});

</script>

</body>
</html>
