<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Password • InsChat</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center px-5 bg-gradient-to-br from-cyan-500 via-blue-600 via-purple-600 to-yellow-400">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img
src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-14 w-14 object-contain mb-4">

<h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 bg-clip-text text-transparent">
InsChat
</h1>

<p class="text-gray-500 text-sm mt-2">
Create a secure password to protect your account.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="mb-4 text-center text-sm
{% if category=='error' %}
text-red-600
{% else %}
text-green-600
{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" class="space-y-5">

<input
type="password"
name="password"
id="password"
placeholder="Create Password"
required
minlength="8"
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500">

<p
id="strength"
class="text-xs text-gray-500 text-center">
Minimum 8 characters required
</p>

<button
type="submit"
class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-500 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">

Continue

</button>

</form>

</div>

</div>

<script>

const pass=document.getElementById("password");
const text=document.getElementById("strength");

pass.addEventListener("input",()=>{

if(pass.value.length<8){

text.innerHTML="❌ Minimum 8 characters";
text.className="text-xs text-red-500 text-center";

}else if(pass.value.length<12){

text.innerHTML="🟡 Good password";
text.className="text-xs text-yellow-500 text-center";

}else{

text.innerHTML="✅ Strong password";
text.className="text-xs text-green-600 text-center";

}

});

</script>

</body>
</html>
