<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Password • InsChat</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-b from-pink-500 via-red-500 to-yellow-400 min-h-screen flex items-center justify-center px-5">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-16 mb-4">

<h1 class="text-2xl font-bold text-gray-900">
Create a Password
</h1>

<p class="text-gray-500 text-sm mt-2">
Your password must contain at least 8 characters.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="mb-4 text-center text-sm
{% if category=='error' %}
text-red-600
{% else %}
text-green-600
{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" class="space-y-4">

<input
type="password"
name="password"
id="password"
placeholder="Password"
required
minlength="8"
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-pink-500">

<p id="strength"
class="text-xs text-gray-500">
Minimum 8 characters
</p>

<button
type="submit"
class="w-full bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 text-white py-3 rounded-xl font-semibold hover:opacity-90">

Next

</button>

</form>

</div>

</div>

<script>

const pass=document.getElementById("password");
const text=document.getElementById("strength");

pass.addEventListener("input",()=>{

if(pass.value.length<8){

text.innerHTML="❌ Minimum 8 characters";
text.className="text-xs text-red-500";

}else{

text.innerHTML="✅ Password looks good";
text.className="text-xs text-green-600";

}

});

</script>

</body>
</html>
