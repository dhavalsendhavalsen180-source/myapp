<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Publish • InsChat</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Inter,system-ui,Arial}
.box{background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:18px}
</style>
</head>

<body>

<div class="max-w-3xl mx-auto p-5">

  <div class="flex justify-between items-center">
    <a href="/create/editor?media_path={{ media_path }}&mode={{ mode }}" class="text-sm text-gray-300 font-bold">⬅ Back</a>
    <h2 class="font-bold text-lg">Publish</h2>
    <div></div>
  </div>

  <div class="mt-5 box p-4">
    <div class="mb-3 text-gray-300 font-semibold">Preview:</div>

    {% if media_path %}
      {% set ext = media_path.rsplit('.',1)[-1].lower() %}
      {% if ext in ['mp4','webm','mov','mkv'] %}
        <video controls style="width:100%;border-radius:14px" src="/create/editor_temp/{{ media_path }}"></video>
      {% else %}
        <img style="width:100%;border-radius:14px" src="/create/editor_temp/{{ media_path }}">
      {% endif %}
    {% else %}
      <div class="text-gray-400">No media selected</div>
    {% endif %}
  </div>

  <form action="/create/publish" method="POST" class="mt-5 space-y-4">

    <input type="hidden" name="media_path" value="{{ media_path }}">
    <input type="hidden" name="mode" value="{{ mode }}">

    <div class="box p-4">
      <label class="block text-sm text-gray-300 font-semibold mb-2">Caption</label>
      <textarea name="caption" rows="3" class="w-full p-3 rounded bg-gray-900 text-white"></textarea>
    </div>

    <div class="box p-4">
      <label class="block text-sm text-gray-300 font-semibold mb-2">Hashtags</label>
      <input name="hashtags" class="w-full p-3 rounded bg-gray-900 text-white" placeholder="#tag1 #tag2">
    </div>

    <div class="box p-4">
      <label class="block text-sm text-gray-300 font-semibold mb-2">Location</label>
      <input name="location" class="w-full p-3 rounded bg-gray-900 text-white" placeholder="Ahmedabad, Gujarat">
    </div>

    <button class="w-full py-4 bg-green-600 rounded-xl font-bold text-lg">
      ✅ Publish Now
    </button>

  </form>

</div>

</body>
</html>
