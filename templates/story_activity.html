<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Story Activity</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#ffffff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:#000;
height:100vh;
overflow:hidden;
}

.sheet{
width:100%;
height:100vh;
background:#fff;
overflow-y:auto;
}

.handle{
width:42px;
height:5px;
background:#d0d0d0;
border-radius:999px;
margin:10px auto;
}

.top{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #efefef;
position:sticky;
top:0;
background:#fff;
z-index:10;
}

.close{
font-size:24px;
cursor:pointer;
margin-right:14px;
color:#000;
}

.count{
font-size:18px;
font-weight:700;
color:#000;
}

.section{
padding:14px 16px;
font-size:13px;
font-weight:600;
color:#8e8e8e;
text-transform:uppercase;
letter-spacing:.5px;
}

.user{
display:flex;
align-items:center;
padding:12px 16px;
}

.user img{
width:48px;
height:48px;
border-radius:50%;
object-fit:cover;
margin-right:12px;
border:1px solid #eee;
}

.info{
flex:1;
}

.name{
font-size:15px;
font-weight:600;
color:#000;
}

.sub{
font-size:13px;
color:#8e8e8e;
margin-top:2px;
}

.heart{
font-size:22px;
}

.likes-header{
padding:16px;
border-top:1px solid #efefef;
font-size:15px;
font-weight:700;
color:#000;
}

.user:hover{
background:#fafafa;
}

</style>
</head>

<body>

<div class="sheet">

<div class="handle"></div>

<div class="top">
<div class="close" onclick="history.back()">✕</div>
<div class="count">
{{ viewers|length }} viewers
</div>
</div>

<div class="section">
Viewed Story
</div>

{% for u in viewers %}
<a href="/profile/{{ u.id }}"
   style="text-decoration:none;color:inherit;">

<div class="user">

<img src="{{ u.photo }}"
onerror="this.src='/static/default_dp.png'">

<div class="info">
<div class="name">{{ u.username }}</div>
<div class="sub">Viewed your story</div>
</div>

</div>

</a>
{% endfor %}

{% for u in likes %}
<a href="/profile/{{ u.id }}"
   style="text-decoration:none;color:inherit;">

<div class="user">

<img src="{{ u.photo }}"
onerror="this.src='/static/default_dp.png'">

<div class="info">
<div class="name">{{ u.username }}</div>
<div class="sub">Liked your story</div>
</div>

<div class="heart">❤️</div>

</div>

</a>
{% endfor %}


</div>

</body>
</html>
