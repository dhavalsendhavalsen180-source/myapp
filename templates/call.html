{% extends "base.html" %}
{% block content %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<div id="callOverlay"
     style="position:fixed;top:0;left:0;width:100%;height:100%;
            background:#000;display:flex;flex-direction:column;
            justify-content:center;align-items:center;z-index:9999">

  <video id="remoteVideo" autoplay playsinline
         style="width:80%;max-width:420px;border-radius:12px;"></video>

  <video id="localVideo" autoplay muted playsinline
         style="width:140px;height:140px;border-radius:12px;
                position:absolute;top:20px;right:20px;
                border:2px solid #fff;"></video>

  <div style="margin-top:22px;">
    <button id="acceptCall"
            style="padding:10px 22px;margin-right:10px;background:green;color:#fff;border:0;border-radius:6px;">
      Accept
    </button>

    <button id="endCall"
            style="padding:10px 22px;background:red;color:#fff;border:0;border-radius:6px;">
      End
    </button>
  </div>
</div>

<script>
  window.CALL_CHAT_ID = {{ chat_id }};
  window.CALL_TYPE = "{{ call_type }}";
  window.IS_CALLER = {{ 1 if caller else 0 }};
</script>

<script src="/static/js/call.js"></script>

{% endblock %}
