<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Following</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="p-4 bg-white shadow flex items-center justify-between">
    <a href="/profile/{{ user.id }}" class="text-xl">⬅ Back</a>
    <h2 class="font-bold text-lg">{{ user.username }} Following</h2>
    <div></div>
  </div>

  <div class="max-w-xl mx-auto mt-4 space-y-2 px-3">
    {% for f in following %}
      <a href="/profile/{{ f.id }}" class="flex items-center gap-3 bg-white p-3 rounded shadow">
        <img src="{{ f.photo or '/static/default_dp.png' }}" class="w-12 h-12 rounded-full object-cover">
        <div class="font-semibold">{{ f.username }}</div>
      </a>
    {% else %}
      <div class="text-center text-gray-500 mt-10">Not following anyone</div>
    {% endfor %}
  </div>

</body>
</html>
