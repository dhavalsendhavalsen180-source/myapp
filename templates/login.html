<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InsChat • Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center px-5 bg-gradient-to-br from-cyan-500 via-blue-600 via-purple-600 to-yellow-400">

<div class="w-full max-w-sm">

<div class="bg-white rounded-3xl shadow-2xl p-8">

<div class="text-center mb-8">

<img
src="{{ url_for('static', filename='inschat_logo.png') }}"
class="mx-auto h-14 w-14 object-contain mb-4">

<h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 bg-clip-text text-transparent">
InsChat
</h1>

<p class="text-gray-500 text-sm mt-2">
Welcome back! Sign in to continue.
</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="mb-4 text-center text-sm
{% if category=='error' %}
text-red-600
{% else %}
text-green-600
{% endif %}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" class="space-y-4">

<input
type="text"
name="username"
placeholder="Username"
required
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500">

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">

<div class="text-right">

<a
href="{{ url_for('auth.forgot_password') }}"
class="text-sm text-purple-600 hover:underline">

Forgot Password?

</a>

</div>

<button
type="submit"
class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 text-white py-3 rounded-xl font-semibold hover:scale-[1.02] hover:shadow-xl transition duration-300">

Log In

</button>

</form>

<div class="flex items-center my-6">

<hr class="flex-1 border-gray-300">

<span class="mx-3 text-xs text-gray-400 font-semibold">
OR
</span>

<hr class="flex-1 border-gray-300">

</div>

<p class="text-center text-gray-600 text-sm">

Don't have an account?

<a
href="{{ url_for('auth.register') }}"
class="font-semibold bg-gradient-to-r from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 bg-clip-text text-transparent hover:underline">

Sign Up

</a>

</p>

</div>

</div>

</body>
</html>
