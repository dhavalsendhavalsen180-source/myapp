<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

<title>Search</title>

</head>

<body class="min-h-screen bg-gradient-to-b from-cyan-50 via-white to-purple-50">

<!-- HEADER -->

<div class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-cyan-100">

<div class="max-w-xl mx-auto p-4">

<form method="GET" action="/explore/search">

<div class="relative">

<input
type="text"
name="q"
value="{{ query }}"
placeholder="Search people..."
class="w-full rounded-2xl border border-cyan-200 bg-white py-3 pl-12 pr-4 shadow-sm outline-none focus:border-blue-500">

<svg
class="absolute left-4 top-3.5 w-5 h-5 text-cyan-600"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<circle cx="11" cy="11" r="7"/>
<path d="M20 20l-3.5-3.5"/>

</svg>

</div>

</form>

</div>

</div>

<!-- USERS -->

<div class="max-w-xl mx-auto p-3 space-y-3">

{% for u in users %}

<a
href="/profile/{{ u.id }}"
class="flex items-center gap-4 rounded-3xl bg-white border border-cyan-100 shadow-md p-3 hover:shadow-xl transition">

{% if u.photo %}

<img
src="{{ u.photo }}"
class="w-14 h-14 rounded-full object-cover ring-2 ring-cyan-400">

{% else %}

<div class="w-14 h-14 rounded-full bg-gradient-to-br from-cyan-400 via-blue-500 to-purple-500 flex items-center justify-center text-white text-xl font-bold">

{{ u.username[0].upper() }}

</div>

{% endif %}

<div class="flex-1">

<div class="font-bold text-slate-800">

{{ u.username }}

</div>

<div class="text-sm text-slate-400">

InsChat Member

</div>

</div>

<div>

<svg
class="w-5 h-5 text-purple-500"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<path d="M9 18l6-6-6-6"/>

</svg>

</div>

</a>

{% endfor %}

{% if users|length == 0 %}

<div class="text-center py-16">

<div class="text-6xl">🔍</div>

<div class="mt-4 text-xl font-bold text-slate-700">

No Results Found

</div>

<div class="text-slate-400 mt-2">

Try another username.

</div>

</div>

{% endif %}

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
window.me = {{ session.get("user_id")|tojson }};
</script>

<script src="/static/js/global_call.js"></script>

</body>

</html>
