<!doctype html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

<div class="p-3 bg-white shadow">
  <form method="GET" action="/explore/search">
    <input type="text" name="q" value="{{ request.args.get('q', '') }}"
           placeholder="Search"
           class="w-full p-2 bg-gray-200 rounded-full text-sm">
  </form>
</div>

<div class="mt-3 px-3">
  {% for u in users %}
  <a href="/profile/{{ u['username'] }}" class="flex items-center space-x-3 py-2">
    <img src="{{ url_for('static', filename='uploads/default.png') }}"
         class="w-10 h-10 rounded-full object-cover">
    <div>
      <p class="font-semibold">{{ u['username'] }}</p>
    </div>
  </a>
  {% endfor %}
</div>

</body>
</html>
