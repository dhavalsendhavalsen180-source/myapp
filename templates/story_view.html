<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stories</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}

.story-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.story-media {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 10px;
}

/* TOP PROGRESS */
.top-bar {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    gap: 5px;
    z-index: 10;
}

.progress {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 5px;
    overflow: hidden;
}

.progress-fill {
    width: 0%;
    height: 100%;
    background: white;
    transition: width linear;
}

/* USER */
.userinfo {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    z-index: 10;
}

/* ACTIONS */
.actions {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    z-index: 10;
}

.reaction {
    font-size: 24px;
    margin: 10px;
    cursor: pointer;
}

input {
    width: 70%;
    padding: 8px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="story-container" id="screen">

    <!-- progress -->
    <div class="top-bar">
        {% for s in stories %}
        <div class="progress">
            <div class="progress-fill" id="pg{{ loop.index0 }}"></div>
        </div>
        {% endfor %}
    </div>

    <!-- user -->
    <div class="userinfo">
        <strong>{{ owner }}</strong>
    </div>

    <!-- media -->
    <img id="storyImage" class="story-media" style="display:none">
    <video id="storyVideo" class="story-media" muted playsinline></video>

    <!-- actions -->
    <div class="actions">
        <div>
            <span class="reaction" onclick="sendReaction('❤️')">❤️</span>
            <span class="reaction" onclick="sendReaction('🔥')">🔥</span>
            <span class="reaction" onclick="sendReaction('😂')">😂</span>
            <span class="reaction" onclick="sendReaction('😮')">😮</span>
        </div>

        <input id="replyBox" placeholder="Reply...">
        <button onclick="sendReply()">Send</button>
    </div>

</div>

<script>

let stories = {{ stories|tojson }};
let index = 0;
let timer;

/* RESET PROGRESS */
function resetProgress() {
    document.querySelectorAll(".progress-fill").forEach(p => {
        p.style.width = "0%";
        p.style.transition = "none";
    });
}

/* LOAD STORY */
function loadStory() {

    clearTimeout(timer);
    resetProgress();

    let s = stories[index];

    let img = document.getElementById("storyImage");
    let vid = document.getElementById("storyVideo");

    img.style.display = "none";
    vid.style.display = "none";
    vid.pause();

    let file = s.filename;
    let src = "/static/stories/" + file;

    /* IMAGE */
    if (file.match(/\.(jpg|jpeg|png|gif)$/)) {

        img.src = src;
        img.style.display = "block";

        animateProgress(index, 5000);
        timer = setTimeout(nextStory, 5000);

    }

    /* VIDEO */
    else {

        vid.src = src;
        vid.style.display = "block";

        vid.onloadedmetadata = () => {
            let duration = (vid.duration * 1000) || 5000;
            vid.play();

            animateProgress(index, duration);
            timer = setTimeout(nextStory, duration);
        };
    }
}

/* PROGRESS ANIMATION */
function animateProgress(i, time) {
    let bar = document.getElementById("pg" + i);
    bar.style.transition = "width " + time + "ms linear";
    bar.style.width = "100%";
}

/* NEXT */
function nextStory() {
    if (index < stories.length - 1) {
        index++;
        loadStory();
    } else {
        window.history.back();
    }
}

/* PREV */
function prevStory() {
    if (index > 0) {
        index--;
        loadStory();
    }
}

/* TAP CONTROL */
document.getElementById("screen").addEventListener("click", (e) => {
    if (e.clientX > window.innerWidth / 2) nextStory();
    else prevStory();
});

/* REACTION */
function sendReaction(emoji) {
    fetch("/stories/api/react", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            story_id: stories[index].id,
            reaction: emoji
        })
    });
}

/* REPLY */
function sendReply() {
    let msg = document.getElementById("replyBox").value;

    fetch("/stories/api/reply", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            to_user: stories[index].user_id,
            story_id: stories[index].id,
            text: msg
        })
    });

    document.getElementById("replyBox").value = "";
}

/* START */
loadStory();

</script>

</body>
</html>
