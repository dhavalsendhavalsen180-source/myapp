<!-- =========================
     INS SHARE SHEET PRO FINAL
========================= -->

<div id="shareModal"
style="
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:99999;
align-items:flex-end;
justify-content:center;
font-family:system-ui;
">

<!-- PANEL -->
<div style="
width:100%;
max-width:520px;
background:#fff;
border-radius:18px 18px 0 0;
height:80vh;
display:flex;
flex-direction:column;
overflow:hidden;
">

<!-- HANDLE -->
<div style="
width:40px;
height:4px;
background:#ccc;
border-radius:20px;
margin:10px auto;
"></div>

<!-- TITLE -->
<div style="
text-align:center;
font-size:17px;
font-weight:700;
padding:10px 0;
border-bottom:1px solid #eee;
">
Share
</div>

<!-- SEARCH -->
<div style="padding:10px;">
  <input id="shareSearch"
  placeholder="Search..."
  oninput="filterUsers()"
  style="
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
  font-size:13px;
  ">
</div>

<!-- USERS -->
<div id="shareUsers"
style="
flex:1;
overflow-y:auto;
padding:10px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
">
</div>

<!-- ACTIONS -->
<div style="
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:12px;
background:#fff;
">

<div onclick="shareWhatsApp()" style="text-align:center;cursor:pointer;">
  <div style="width:50px;height:50px;border-radius:50%;background:#f2f2f2;display:flex;align-items:center;justify-content:center;">📱</div>
  <div style="font-size:11px;margin-top:4px;">WhatsApp</div>
</div>

<div onclick="shareTelegram()" style="text-align:center;cursor:pointer;">
  <div style="width:50px;height:50px;border-radius:50%;background:#f2f2f2;display:flex;align-items:center;justify-content:center;">✈</div>
  <div style="font-size:11px;margin-top:4px;">Telegram</div>
</div>

<div onclick="copyLink()" style="text-align:center;cursor:pointer;">
  <div style="width:50px;height:50px;border-radius:50%;background:#f2f2f2;display:flex;align-items:center;justify-content:center;">🔗</div>
  <div style="font-size:11px;margin-top:4px;">Copy</div>
</div>

</div>

</div>
</div>

<script>

let currentShareReel = null;
let allUsers = [];

/* OPEN */
async function openShare(reelId){

  currentShareReel = reelId;
  document.getElementById("shareModal").style.display = "flex";

  const box = document.getElementById("shareUsers");
  box.innerHTML = "Loading...";

  const res = await fetch("/reels/api/following_users");
  const data = await res.json();

  allUsers = data.users || [];
  renderUsers(allUsers);
}

/* RENDER USERS */
function renderUsers(users){

  const box = document.getElementById("shareUsers");

  if(!users || users.length === 0){
    box.innerHTML = `
      <div style="grid-column:span 4;text-align:center;color:#777;font-size:13px">
        No users
      </div>`;
    return;
  }

  box.innerHTML = "";

  users.forEach(user => {

    box.innerHTML += `
      <div onclick="sendReel(${user.id})"
      style="text-align:center;cursor:pointer;">

        <img src="${user.avatar}"
        onerror="this.src='/static/default_dp.png'"
        style="
          width:60px;
          height:60px;
          border-radius:50%;
          object-fit:cover;
          border:2px solid #eee;
        ">

        <div style="
          font-size:12px;
          margin-top:6px;
          color:#111;
          white-space:nowrap;
          overflow:hidden;
          text-overflow:ellipsis;
        ">
          ${user.username}
        </div>

      </div>
    `;
  });
}

/* SEARCH */
function filterUsers(){
  const val = document.getElementById("shareSearch").value.toLowerCase();
  renderUsers(allUsers.filter(u => u.username.toLowerCase().includes(val)));
}

/* CLOSE */
function closeShare(){
  document.getElementById("shareModal").style.display = "none";
}

/* SEND */
async function sendReel(userId){
  await fetch(`/reels/share_to_user/${currentShareReel}/${userId}`,{
    method:"POST"
  });

  closeShare();
  alert("Sent");
}

/* COPY */
function copyLink(){
  const url = `${window.location.origin}/reels?open=${currentShareReel}`;
  navigator.clipboard.writeText(url);
  alert("Copied");
}

/* WHATSAPP */
function shareWhatsApp(){
  const url = `${window.location.origin}/reels?open=${currentShareReel}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(url)}`);
}

/* TELEGRAM */
function shareTelegram(){
  const url = `${window.location.origin}/reels?open=${currentShareReel}`;
  window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}`);
}

/* OUTSIDE CLOSE */
document.getElementById("shareModal").onclick = function(e){
  if(e.target.id === "shareModal") closeShare();
}

</script>
