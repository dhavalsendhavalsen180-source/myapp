<!-- =========================
     INS SHARE SHEET PRO FINAL
========================= -->
<div id="shareModal"
style="
position:fixed;
inset:0;
background:rgba(0,0,0,.60);
display:none;
z-index:99999;
align-items:flex-end;
justify-content:center;
font-family:system-ui;
backdrop-filter:blur(8px);
">

<!-- PANEL -->
<div style="
width:100%;
max-width:520px;
height:80vh;
display:flex;
flex-direction:column;
overflow:hidden;
background:#fff;
border-radius:28px 28px 0 0;
box-shadow:0 -10px 35px rgba(0,0,0,.35);
">

<!-- HANDLE -->
<div style="
width:50px;
height:5px;
background:#d1d5db;
border-radius:999px;
margin:12px auto 8px;
"></div>

<!-- TITLE -->
<div style="
text-align:center;
font-size:18px;
font-weight:700;
padding:12px;
border-bottom:1px solid #eee;
">
Share Reel
</div>

<!-- SEARCH -->
<div style="padding:12px;">
<input
id="shareSearch"
placeholder="Search friends..."
oninput="filterUsers()"
style="
width:100%;
padding:12px 14px;
border:none;
outline:none;
background:#f3f4f6;
border-radius:14px;
font-size:14px;
">
</div>

<!-- USERS -->
<div
id="shareUsers"
style="
flex:1;
overflow-y:auto;
padding:14px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
">
</div>

<!-- ACTIONS -->
<div style="
display:flex;
justify-content:space-evenly;
align-items:center;
padding:18px;
border-top:1px solid #eee;
background:#fff;
">

<!-- WhatsApp -->
<div onclick="shareWhatsApp()" style="text-align:center;cursor:pointer;">

<div style="
width:60px;
height:60px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
background:linear-gradient(135deg,#25D366,#1ebe5d);
box-shadow:0 6px 18px rgba(37,211,102,.35);
">
📱
</div>

<div style="
font-size:12px;
font-weight:700;
margin-top:8px;
">
WhatsApp
</div>

</div>

<!-- Telegram -->
<div onclick="shareTelegram()" style="text-align:center;cursor:pointer;">

<div style="
width:60px;
height:60px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
background:linear-gradient(135deg,#229ED9,#0088cc);
box-shadow:0 6px 18px rgba(34,158,217,.35);
">
✈️
</div>

<div style="
font-size:12px;
font-weight:700;
margin-top:8px;
">
Telegram
</div>

</div>

<!-- Copy -->
<div onclick="copyLink()" style="text-align:center;cursor:pointer;">

<div style="
width:60px;
height:60px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
background:linear-gradient(135deg,#7c3aed,#2563eb);
box-shadow:0 6px 18px rgba(124,58,237,.35);
">
🔗
</div>

<div style="
font-size:12px;
font-weight:700;
margin-top:8px;
">
Copy Link
</div>

</div>

</div>

</div>
</div>

<script>

let currentShareReel = null;
let allUsers = [];

/* OPEN */
async function openShare(reelId){

  currentShareReel = reelId;
  document.getElementById("shareModal").style.display = "flex";

  const box = document.getElementById("shareUsers");
  box.innerHTML = "Loading...";

  const res = await fetch("/reels/api/following_users");
  const data = await res.json();

  allUsers = data.users || [];
  renderUsers(allUsers);
}

/* RENDER USERS */
function renderUsers(users){

  const box = document.getElementById("shareUsers");

  if(!users || users.length === 0){
    box.innerHTML = `
      <div style="grid-column:span 4;text-align:center;color:#777;font-size:13px">
        No users
      </div>`;
    return;
  }

  box.innerHTML = "";

  users.forEach(user => {

    box.innerHTML += `
      <div onclick="sendReel(${user.id})"
      style="text-align:center;cursor:pointer;">

        <img src="${user.avatar}"
        onerror="this.src='/static/default_dp.png'"
        style="
          width:60px;
          height:60px;
          border-radius:50%;
          object-fit:cover;
          border:2px solid #eee;
        ">

        <div style="
          font-size:12px;
          margin-top:6px;
          color:#111;
          white-space:nowrap;
          overflow:hidden;
          text-overflow:ellipsis;
        ">
          ${user.username}
        </div>

      </div>
    `;
  });
}

/* SEARCH */
function filterUsers(){
  const val = document.getElementById("shareSearch").value.toLowerCase();
  renderUsers(allUsers.filter(u => u.username.toLowerCase().includes(val)));
}

/* CLOSE */
function closeShare(){
  document.getElementById("shareModal").style.display = "none";
}

/* SEND */
async function sendReel(userId){
  await fetch(`/reels/share_to_user/${currentShareReel}/${userId}`,{
    method:"POST"
  });

  closeShare();
  alert("Sent");
}

/* COPY */
function copyLink(){
  const url = `${window.location.origin}/reels?open=${currentShareReel}`;
  navigator.clipboard.writeText(url);
  alert("Copied");
}

/* WHATSAPP */
function shareWhatsApp(){
  const url = `${window.location.origin}/reels?open=${currentShareReel}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(url)}`);
}

/* TELEGRAM */
function shareTelegram(){
  const url = `${window.location.origin}/reels?open=${currentShareReel}`;
  window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}`);
}

/* OUTSIDE CLOSE */
document.getElementById("shareModal").onclick = function(e){
  if(e.target.id === "shareModal") closeShare();
}

</script>
