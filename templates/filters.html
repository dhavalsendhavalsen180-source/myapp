<div id="filterBar" class="flex overflow-x-auto gap-2 p-2 bg-white shadow-md rounded-lg">
    
    <!-- DEFAULT -->
    <img class="filter-thumb" data-filter="none" src="https://via.placeholder.com/70?text=Normal">

    <!-- BASIC -->
    <img class="filter-thumb" data-filter="brightness(1.2)" src="https://via.placeholder.com/70?text=Bright">
    <img class="filter-thumb" data-filter="contrast(1.3)" src="https://via.placeholder.com/70?text=Contrast">
    <img class="filter-thumb" data-filter="grayscale(1)" src="https://via.placeholder.com/70?text=B&W">
    <img class="filter-thumb" data-filter="sepia(1)" src="https://via.placeholder.com/70?text=Sepia">
    <img class="filter-thumb" data-filter="invert(1)" src="https://via.placeholder.com/70?text=Invert">

    <!-- PRO INSTAGRAM FEEL -->
    <img class="filter-thumb" data-filter="saturate(1.8) contrast(1.1)" src="https://via.placeholder.com/70?text=Vibrant">
    <img class="filter-thumb" data-filter="contrast(1.4) brightness(1.1) saturate(1.5)" src="https://via.placeholder.com/70?text=HDR">
    <img class="filter-thumb" data-filter="hue-rotate(20deg) saturate(1.5)" src="https://via.placeholder.com/70?text=Warm">
    <img class="filter-thumb" data-filter="hue-rotate(-20deg) saturate(1.4)" src="https://via.placeholder.com/70?text=Cool">
    <img class="filter-thumb" data-filter="brightness(0.9) contrast(1.3)" src="https://via.placeholder.com/70?text=Moody">
    <img class="filter-thumb" data-filter="brightness(1.3) contrast(0.9)" src="https://via.placeholder.com/70?text=Soft">

    <!-- VINTAGE SET -->
    <img class="filter-thumb" data-filter="sepia(.7) contrast(1.2) brightness(.9)" src="https://via.placeholder.com/70?text=Vintage">
    <img class="filter-thumb" data-filter="grayscale(.4) sepia(.5) brightness(1.1)" src="https://via.placeholder.com/70?text=Retro">
    <img class="filter-thumb" data-filter="hue-rotate(200deg) contrast(1.3)" src="https://via.placeholder.com/70?text=Teal++Orange">

    <!-- INSTAGRAM STYLE PREMIUM -->
    <img class="filter-thumb" data-filter="brightness(1.1) saturate(1.3) contrast(1.1)" src="https://via.placeholder.com/70?text=Lux">
    <img class="filter-thumb" data-filter="blur(2px) brightness(1.2)" src="https://via.placeholder.com/70?text=Glow">
    <img class="filter-thumb" data-filter="contrast(1.5) sepia(.4)" src="https://via.placeholder.com/70?text=Deep">
</div>
