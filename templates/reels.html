<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reels</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    .reels-container {
      height: 100vh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      width: 100%;
      position: relative;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }

    /* overlay UI */
    .overlay {
      position: absolute;
      bottom: 20px;
      left: 15px;
      color: white;
    }

    .right-ui {
      position: absolute;
      right: 10px;
      bottom: 80px;
      color: white;
      text-align: center;
    }

    .btn {
      margin-bottom: 20px;
      font-size: 22px;
    }
  </style>
</head>

<body>

<div class="reels-container" id="reelsContainer">

  {% for r in reels %}
  <div class="reel">
    <video src="{{ r.video }}" muted loop playsinline></video>

    <div class="overlay">
      <b>@{{ profile.username }}</b><br>
      {{ r.caption if r.caption else "Awesome reel 🔥" }}
    </div>

    <div class="flex items-center gap-5 text-black">

  <!-- LIKE -->
  <button class="flex items-center justify-center">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M20.8 4.6c-1.8-1.8-4.7-1.8-6.5 0L12 6.9l-2.3-2.3c-1.8-1.8-4.7-1.8-6.5 0s-1.8 4.7 0 6.5L12 21l8.8-9.9c1.8-1.8 1.8-4.7 0-6.5z"/>
    </svg>
  </button>

  <!-- COMMENT -->
  <button class="flex items-center justify-center">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M21 15a4 4 0 01-4 4H8l-5 3V7a4 4 0 014-4h10a4 4 0 014 4z"/>
    </svg>
  </button>

  <!-- SHARE -->
  <button class="flex items-center justify-center">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M22 2L11 13"/>
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M22 2l-7 20-4-9-9-4 20-7z"/>
    </svg>
  </button>

</div>
  {% endfor %}

</div>

<script>
const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const vid = entry.target;

    if (entry.isIntersecting) {
      vid.play().catch(()=>{});
    } else {
      vid.pause();
    }
  });
}, { threshold: 0.7 });

videos.forEach(v => observer.observe(v));
</script>

</body>
</html>
