<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>{{ title|default('InsChat') }}</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/icons/favicon.ico">
  <link rel="apple-touch-icon" href="/static/icons/inschat_icon_180x180.png">

  <!-- Browser Theme -->
  <meta name="theme-color" content="#2563eb">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="min-h-screen bg-gradient-to-br from-cyan-500 via-blue-600 via-purple-600 to-yellow-400 text-gray-900">

{% block content %}{% endblock %}

</body>
</html>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js');
  });
}
</script>
</body>
