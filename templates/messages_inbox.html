{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/messages.css">

<div class="dm-container">

    <!-- Top Bar -->
    <div class="dm-top">
        <div class="dm-top-icons">
        </div>
    </div>

    <!-- Search -->
    <div class="dm-search-box">
        <input type="text" placeholder="Search">
    </div>

    <!-- Stories -->
    <div class="dm-stories">

        <div class="story">
            <div class="story-ring">
                <img src="{{ url_for('static', filename='profile/user_' ~ session['user_id'] ~ '.jpg') }}">
            </div>
            <span class="story-name">Your story</span>
        </div>

        {% for c in chats %}
        <div class="story">
            <div class="story-ring">
                <img src="{{ c.photo }}">
            </div>
            <span class="story-name">{{ c.username }}</span>
        </div>
        {% endfor %}
    </div>

    <!-- Chat List -->
    <div class="dm-chat-list">
        {% for c in chats %}
        <a href="/messages/chat/{{ c.other_id }}" class="dm-chat-item">
            <img src="{{ c.photo }}" class="dm-chat-dp">

            <div class="dm-chat-info">
                <span class="name">{{ c.username }}</span>
                <span class="last">{{ c.last_msg }}</span>
            </div>

            {% if c.unread > 0 %}
            <span class="dm-unread">{{ c.unread }}</span>
            {% endif %}
        </a>
        {% endfor %}
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
  <!-- 🏠🔍➕🎬BOTTOM NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-inner flex justify-around py>
  <a href="/posts/feed" class="flex items-center justify-center">
  <svg class="w-6 h-6 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke->
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1V10.5z"/>
  </svg>
</a>
  <a href="/explore" class="flex items-center justify-center">
  <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <circle cx="11" cy="11" r="7"></circle>
    <path d="M21 21l-4.3-4.3"></path>
  </svg>
</a>
  <a href="/create" class="flex items-center justify-center">
  <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"></path>
  </svg>
</a>
  <a href="/reels" class="flex items-center justify-center">
  <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">

    <!-- reel frame -->
    <rect x="3" y="3" width="18" height="18" rx="3"></rect>

    <!-- play triangle -->
    <path d="M10 9l6 3-6 3V9z" fill="currentColor"></path>

  </svg>
</a>
  <a href="/profile/{{ current_user }}">
  <img src="{{ current_user_photo }}"
       class="w-7 h-7 rounded-full object-cover border"
       onerror="this.src='/static/default_dp.png'">
</a>
</div>

</div>

{% endblock %}
