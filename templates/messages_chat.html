{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="/static/css/messages.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<script>
  window.chat_id = {{ chat_id }};
  window.me = {{ me }};
  window.initialMessages = {{ messages | tojson | safe }};
</script>

<div class="chat-container">

  <div class="chat-top">
    <a href="/messages" class="back-btn">←</a>
    <img src="{{ other.photo }}" class="chat-dp">

    <div class="chat-user">
      <div class="name-row">
        <span class="name">{{ other.username }}</span>
        <span class="active-dot" id="activeDot"></span>
      </div>
      <span class="status" id="userStatus">Active now</span>
    </div>

    <div class="chat-icons">
      <span id="audioBtn">📞</span>
      <span id="videoBtn">🎥</span>
    </div>
  </div>

  <div id="messagesArea" class="messages"></div>

  <div id="typingIndicator" class="typing hidden">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="send-box">
    <span class="icon" id="attachBtn">📎</span>
    <input type="file" id="attachInput" hidden>
    <input id="msgInput" type="text" placeholder="Message..." autocomplete="off">
    <span class="icon" id="voiceBtn">🎤</span>
    <button id="sendBtn" type="button">➤</button>
  </div>

</div>

<script src="/static/js/messages.js"></script>

<script>
  document.getElementById("audioBtn").onclick = () => {
    location.href = `/call/${window.chat_id}?type=audio&caller=1`;
  };
  document.getElementById("videoBtn").onclick = () => {
    location.href = `/call/${window.chat_id}?type=video&caller=1`;
  };
</script>

{% endblock %}
