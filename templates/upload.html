<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Story • InsChat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-6">

  <!-- Header -->
  <div class="flex items-center justify-between border-b pb-3 mb-5">
    <h1 class="text-lg font-semibold text-gray-800">📸 New Story</h1>
    <a href="/posts/feed" class="text-sm text-blue-500 hover:underline">← Back</a>
  </div>

  <!-- Story Form -->
  <form action="/stories/create" method="POST" enctype="multipart/form-data" class="space-y-5">

    <!-- Media select -->
    <label class="block text-sm font-medium text-gray-600">Select Image / Video</label>
    <input type="file"
           id="storyInput"
           name="story"
           accept="image/*,video/*"
           required
           class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">

    <!-- Preview -->
    <div id="previewBox" class="hidden mt-3">
      <img id="previewImage" class="w-full rounded-lg shadow" />
      <video id="previewVideo" class="w-full rounded-lg shadow hidden" controls></video>
    </div>

    <!-- Text -->
    <label class="block text-sm font-medium text-gray-600">Story Text</label>
    <input type="text" name="text" placeholder="Write something..."
           class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">

    <!-- Background -->
    <label class="block text-sm font-medium text-gray-600">Text Background</label>
    <input type="color" name="text_bg" value="#000000"
           class="w-16 h-10 border rounded">

    <!-- Music -->
    <label class="block text-sm font-medium text-gray-600">Music</label>
    <input type="text" name="music" placeholder="Music URL (optional)"
           class="w-full border rounded-lg px-3 py-2">

    <!-- Submit -->
    <button type="submit"
            class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-2 rounded-lg shadow hover:opacity-90">
      Share Story 🚀
    </button>

  </form>
</div>

<script>
  const input = document.getElementById("storyInput");
  const img = document.getElementById("previewImage");
  const vid = document.getElementById("previewVideo");
  const box = document.getElementById("previewBox");

  input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;

    box.classList.remove("hidden");
    const url = URL.createObjectURL(file);

    if (file.type.startsWith("image/")) {
      img.src = url;
      img.classList.remove("hidden");
      vid.classList.add("hidden");
    } else {
      vid.src = url;
      vid.classList.remove("hidden");
      img.classList.add("hidden");
    }
  });
</script>

</body>
</html>
