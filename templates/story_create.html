<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Create Story</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.upload{
    text-align:center;
}

.btn{
    background:#0095f6;
    padding:14px 24px;
    border-radius:30px;
    font-size:18px;
    display:inline-block;
}
</style>
</head>

<body>

<div class="upload">

    <h2>Create Story</h2>

    <br>

    <label class="btn">
        Upload Story
        <input type="file"
               hidden
               accept="image/*,video/*"
               onchange="upload(event)">
    </label>

</div>

<script>
async function upload(event){

    let file = event.target.files[0];
    if(!file) return;

    let form = new FormData();
    form.append("story", file);

    try{

        let res = await fetch("/stories/add",{
            method:"POST",
            body:form,
            redirect:"manual"
        });

        // upload complete
        window.location.replace("/posts/feed");

    }catch(e){
        console.error(e);
        alert("Story upload failed");
    }
}
</script>

</body>
</html>
